[deploy]
startCommand = "./start.sh"
healthcheckPath = "/api/health"
healthcheckTimeout = 90
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# ── Required: Telegram ────────────────────────────────────────────────────
[[deploy.envVars]]
name = "TELEGRAM_BOT_TOKEN"
description = "Your Telegram bot token from @BotFather (looks like 7123456789:AAF...)"
required = true

[[deploy.envVars]]
name = "TELEGRAM_CHAT_ID"
description = "Your Telegram numeric chat ID from @userinfobot"
required = true

# ── Required: License ─────────────────────────────────────────────────────
[[deploy.envVars]]
name = "LICENSE_KEY"
description = "Your Breadbot license key (from your purchase confirmation email)"
required = true

# ── Required: Web Panel ───────────────────────────────────────────────────
[[deploy.envVars]]
name = "MCP_SECRET"
description = "Secret key securing the connection between the bot and web panel. Use any strong random string (e.g. openssl rand -hex 32)."
required = true

[[deploy.envVars]]
name = "WHOP_API_KEY"
description = "Whop API key for first-login license validation. Create at whop.com → Developer → API Keys."
required = true

[[deploy.envVars]]
name = "RAILWAY_API_TOKEN"
description = "Railway account token — lets the web panel read and update your bot's settings. Create at railway.app → Account Settings → Tokens."
required = true

# MCP server runs inside the same container on localhost:8051.
# Buyers do not need to change this — it is pre-wired.
[[deploy.envVars]]
name = "MCP_SERVER_URL"
description = "Internal address of the bot's MCP server (leave as default — panel and bot run in the same container)."
required = false
defaultValue = "http://localhost:8051"

# Railway auto-injects RAILWAY_PROJECT_ID and RAILWAY_SERVICE_ID into every
# service at runtime. You do not need to set these manually.
[[deploy.envVars]]
name = "PANEL_PASSWORD_HASH"
description = "Leave blank — set automatically when you complete first-login setup in the web panel."
required = false

[[deploy.envVars]]
name = "VAPID_PRIVATE_KEY"
description = "Optional — enables browser push notifications. Leave blank if not needed."
required = false

[[deploy.envVars]]
name = "VAPID_PUBLIC_KEY"
description = "Optional — see VAPID_PRIVATE_KEY."
required = false

[[deploy.envVars]]
name = "VAPID_EMAIL"
description = "Optional — your email address, required only if using VAPID push notifications."
required = false

# ── Exchange API Keys ─────────────────────────────────────────────────────
[[deploy.envVars]]
name = "COINBASE_API_KEY"
description = "Coinbase Advanced Trade API key — View + Trade permissions only. Never enable Transfer or Withdraw."
required = false

[[deploy.envVars]]
name = "COINBASE_API_SECRET"
description = "Coinbase Advanced Trade API secret."
required = false

[[deploy.envVars]]
name = "KRAKEN_API_KEY"
description = "Kraken API key — Query Funds + Trade permissions only."
required = false

[[deploy.envVars]]
name = "KRAKEN_API_SECRET"
description = "Kraken API secret."
required = false

# ── Risk Settings ─────────────────────────────────────────────────────────
[[deploy.envVars]]
name = "MAX_POSITION_SIZE_PCT"
description = "Max % of portfolio per trade. Default 0.02 = 2% (e.g. $100 on a $5k account)."
required = false
defaultValue = "0.02"

[[deploy.envVars]]
name = "DAILY_LOSS_LIMIT_PCT"
description = "Auto-pause trading if daily losses hit this % of portfolio. Default 0.05 = 5%."
required = false
defaultValue = "0.05"

[[deploy.envVars]]
name = "MIN_LIQUIDITY_USD"
description = "Minimum token liquidity to generate an alert. Default $15,000."
required = false
defaultValue = "15000"

[[deploy.envVars]]
name = "MIN_VOLUME_24H_USD"
description = "Minimum 24h trading volume to generate an alert. Default $40,000."
required = false
defaultValue = "40000"

# ── Optional: Enhanced rug detection ────────────────────────────────────
[[deploy.envVars]]
name = "GOPLUS_API_KEY"
description = "GoPlus API key — free at gopluslabs.io. Raises scanner rate limits."
required = false

[[deploy.envVars]]
name = "ARKHAM_API_KEY"
description = "Arkham Intelligence API key — free tier at arkhamintelligence.com. Enables smart-money wallet detection."
required = false

# ── Optional: Alpha channel monitoring ───────────────────────────────────
[[deploy.envVars]]
name = "ALPHA_CHANNEL_IDS"
description = "Comma-separated Telegram channel IDs to monitor for contract addresses."
required = false

[[deploy.envVars]]
name = "TELEGRAM_SESSION_STRING"
description = "Telethon session string for alpha channel monitoring. Generate once and store here."
required = false

[[deploy.envVars]]
name = "TELEGRAM_API_ID"
description = "Telegram app API ID from my.telegram.org/apps — required for alpha channel monitor."
required = false

[[deploy.envVars]]
name = "TELEGRAM_API_HASH"
description = "Telegram app API hash from my.telegram.org/apps — required for alpha channel monitor."
required = false

[[deploy.envVars]]
name = "ALPHA_SIGNAL_BOOST"
description = "Score boost when a token appears in 2+ alpha channels within 15 minutes."
required = false
defaultValue = "8"

[[deploy.envVars]]
name = "SMART_MONEY_SIGNAL_BOOST"
description = "Score boost when a labeled smart-money wallet has bought in via Arkham."
required = false
defaultValue = "8"

# ── Portfolio size ─────────────────────────────────────────────────────────────
[[deploy.envVars]]
name = "TOTAL_PORTFOLIO_USD"
description = "Your total account size in USD. Used for position sizing — if your account is $500 not $5000, set this correctly or every trade will be 10x oversized."
required = true
defaultValue = "5000"

[[deploy.envVars]]
name = "MAX_OPEN_POSITIONS"
description = "Maximum number of meme coin positions open at once. Default 5."
required = false
defaultValue = "5"

[[deploy.envVars]]
name = "EXECUTION_MODE"
description = "Set to 'auto' to enable automatic trade execution. Leave as 'manual' (default) to receive alerts only."
required = false
defaultValue = "manual"

# ── Optional: Gemini exchange ──────────────────────────────────────────────────
[[deploy.envVars]]
name = "GEMINI_API_KEY"
description = "Gemini exchange API key — Fund Management + Trading permissions only. No withdrawal."
required = false

[[deploy.envVars]]
name = "GEMINI_SECRET_KEY"
description = "Gemini exchange API secret."
required = false

# ── Optional: Robinhood crypto ────────────────────────────────────────────────
[[deploy.envVars]]
name = "ROBINHOOD_USERNAME"
description = "Robinhood account email. Required only if using Robinhood as execution venue."
required = false

[[deploy.envVars]]
name = "ROBINHOOD_PASSWORD"
description = "Robinhood account password."
required = false

# ── Optional: Axiom signal layer ──────────────────────────────────────────────
[[deploy.envVars]]
name = "AXIOM_SESSION_COOKIE"
description = "Axiom auth cookie (auth-access-token + auth-refresh-token). Extract from Chrome DevTools → Application → Cookies → axiom.trade. Enables Axiom pump stream scoring (+6 per hit). Leave blank to use DEXScreener boosts only."
required = false
